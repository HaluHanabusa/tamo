<!doctype html>
<meta charset="utf-8" />
<style>
  body { font: 13px/1.5 system-ui, sans-serif; width: 300px; margin: 10px; }
  h1 { font-size: 14px; margin: 0 0 8px; }
  label { display: block; margin: 6px 0 2px; color: #555; }
  input { width: 100%; box-sizing: border-box; padding: 4px 6px; }
  button { margin-top: 8px; padding: 6px 10px; cursor: pointer; }
  #scoop { font-weight: 600; }
  #status { white-space: pre-wrap; background: #f5f5f5; padding: 6px; margin-top: 8px;
            border-radius: 4px; min-height: 2em; max-height: 160px; overflow: auto; }
  .row { display: flex; gap: 6px; }
</style>
<h1>tamo scoop 🎣</h1>
<label data-i18n="labelPort">tamo port (`tamo serve` inbox, default 8787)</label>
<input id="port" type="number" value="8787" />
<label data-i18n="labelToken">Token (auto-set; manual: value of `tamo token`)</label>
<input id="token" type="password" data-i18n-placeholder="phToken" placeholder="auto-filled by Re-pair" />
<div class="row">
  <button id="save" data-i18n="btnSave">Save</button>
  <button id="health" data-i18n="btnHealth">Check connection</button>
  <button id="pair" data-i18n="btnPair">Re-pair</button>
</div>
<button id="scoop" data-i18n="btnScoop">Scoop this conversation</button>
<label data-i18n="labelRecall">Search past context (result is copied → paste into an AI)</label>
<div class="row">
  <select id="rsrc" style="flex:0 0 40%">
    <option value="" data-i18n="optAllSources">All sources</option>
    <option value="claude_web">Claude (Web)</option>
    <option value="claude_code">Claude Code</option>
    <option value="chatgpt">ChatGPT</option>
    <option value="gemini">Gemini</option>
    <option value="cursor">Cursor</option>
  </select>
  <input id="rq" data-i18n-placeholder="phQuery" placeholder="e.g. deck cover interlock" />
</div>
<button id="recall" data-i18n="btnRecall">Search &amp; copy</button>
<label style="margin-top:8px"><input type="checkbox" id="fab" checked />
  <span data-i18n="labelFab">Always show the 🎣 button on supported sites</span></label>
<div id="status" data-i18n="statusReady">Ready</div>
<script src="popup.js"></script>
